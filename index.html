<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuigyokuP专属名片 - 最终修正版</title>
    <!-- 引入高级艺术字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
<style>
    /* ================================== */
    /*      红蓝炫彩流体背景 & 动态星尘     */
    /* ================================== */
    body {
        font-family: 'Noto Sans JP', sans-serif;
        margin: 0; padding: 0;
        height: 100vh; width: 100vw;
        overflow: hidden;
        background-color: #05050a;
    }
    .bg-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: -2; transition: background-color 0.8s ease;
    }
    .orb {
        position: absolute; border-radius: 50%; filter: blur(100px);
        transition: all 0.8s ease; opacity: 0.8;
    }
    .orb-red { width: 70vw; height: 70vw; background: rgba(229, 57, 53, 0.7); top: -10%; left: -10%; animation: float 15s infinite alternate ease-in-out; }
    .orb-blue { width: 80vw; height: 80vw; background: rgba(30, 136, 229, 0.4); bottom: -20%; right: -15%; animation: float 18s infinite alternate-reverse ease-in-out; }
    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 15%) scale(1.1); } }

    .dynamic-stars {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1; pointer-events: none;
        background-image: radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent), radial-gradient(1px 1px at 100px 150px, #fff, transparent);
        background-size: 200px 200px; animation: drift 60s linear infinite;
    }
    @keyframes drift { from { background-position: 0 0; } to { background-position: 100% 100%; } }

    /* 翻转背景变色 */
    .bg-container.is-flipped-bg { background-color: #020b14; }
    .bg-container.is-flipped-bg .orb-red { opacity: 0.1; }
    .bg-container.is-flipped-bg .orb-blue { opacity: 0.8; transform: scale(1.3); }

    /* 音乐按钮 */
    .music-btn {
        position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
        background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 50%; color: white; cursor: pointer; z-index: 100;
        backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center;
    }

    /* ================================== */
    /*          核心卡片容器                */
    /* ================================== */
    .card-wrapper {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 350px; height: 200px; perspective: 1000px; z-index: 10;
    }
    .card-inner {
        position: relative; width: 100%; height: 100%;
        transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d; border-radius: 15px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }
    .card-inner.is-flipped { transform: rotateY(180deg); }
    .card-face {
        position: absolute; width: 100%; height: 100%;
        backface-visibility: hidden; border-radius: 15px; background: white; overflow: hidden;
    }

    /* 正面布局 (春香) */
    .front-bg-red {
        position: absolute; top: 0; left: 0; width: 58%; height: 100%;
        background-color: #d32f2f; clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
    }
    .front-character {
        position: absolute; bottom: 0; left: -10%; width: 65%; height: 95%;
        background: url('1.png') no-repeat bottom center/contain; z-index: 2;
        filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
    }
    .front-content {
        position: absolute; top: 0; right: 0; width: 60%; height: 100%;
        padding: 20px; display: flex; flex-direction: column; justify-content: center;
        align-items: flex-end; text-align: right; z-index: 3;
    }
    .front-content h2 { margin: 0; font-size: 26px; color: #111; font-weight: 900; }
    .front-content p { margin: 2px 0; font-size: 10px; color: #666; font-weight: bold; }

    /* ================================== */
    /*          名片背面 (Bug修复核心)      */
    /* ================================== */
    .card-back { transform: rotateY(180deg); position: relative; }

    /* 背面上部 - 白色区域 */
    .back-top {
        position: absolute; top: 0; left: 0; width: 100%; height: 44%;
        padding: 15px; box-sizing: border-box; z-index: 5;
    }
    .back-top p { margin: 2px 0; font-size: 11px; color: #333; font-weight: 700; }
    
    /* 关键修复：诗句文字 */
    .haiku {
        margin-top: 12px !important;
        font-size: 11px !important;
        color: #005a8d !important; /* 加深蓝色 */
        font-style: italic;
        font-weight: bold;
        text-shadow: 0 0 5px rgba(0,90,141,0.2);
    }

    .qr-code {
        position: absolute; top: 15px; right: 15px; width: 45px; height: 45px;
        background: url('space.bilibili.com_488509701.png') center/cover;
        border: 1px solid #eee; border-radius: 4px;
    }
    .qr-code::after {
        content: 'bilibili'; position: absolute; top: 100%; left: 50%;
        transform: translateX(-50%); color: #fb7299; font-size: 8px; font-weight: 900;
    }

    /* 关键修复：背面下部 - 蓝色区域 & 大字 */
    .back-bottom {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 56%;
        background: #007bb6;
        display: flex; align-items: center; justify-content: center; /* 强行居中大字 */
        z-index: 1;
    }
    .producer-card-text {
        font-family: 'Oswald', sans-serif;
        font-size: 44px; color: white; font-weight: 500;
        font-style: italic; line-height: 0.8; letter-spacing: -1.5px;
        text-shadow: 4px 4px 0px #0a0a0a;
        margin-top: 10px; /* 稍微下移一点点，视觉更平衡 */
    }

    /* 关键：扒边缘的 OtherCreatures 图案 */
    .peeking-creature {
        position: absolute;
        bottom: 56%; /* 恰好压在蓝白交界线上 */
        left: 50%; transform: translateX(-50%);
        width: 140px; height: auto;
        z-index: 3; /* 在蓝色背景之上，白色文字之下 */
        pointer-events: none;
        transition: transform 0.3s ease;
    }
    .card-inner:hover .peeking-creature { transform: translateX(-50%) translateY(-10px); }

</style>
</head>
<body>

<div id="bgContainer" class="bg-container">
    <div class="orb orb-red"></div><div class="orb orb-blue"></div>
</div>
<div class="dynamic-stars"></div>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<div id="musicToggle" class="music-btn">🔇</div>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <!-- 正面 -->
        <div class="card-face">
            <div class="front-bg-red"></div>
            <div class="front-character"></div>
            <img src="IDOLMASTER20THLogo.png" style="position:absolute; top:12px; left:10px; width:55px;" alt="logo">
            <div class="front-content">
                <h2>SuigyokuP</h2>
                <p>765プロデューサー科</p>
                <p>天海春香担当プロデューサー</p>
                <div style="font-size:9px; color:#999; margin:10px 0;">TAP TO START <span style="color:#111">N))</span></div>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>📮:</span> 1635786118@QQ.com</div>
                    <div><span>📺:</span> bangumi.tv/user/922571</div>
                </div>
            </div>
        </div>
        <!-- 背面 -->
        <div class="card-face card-back">
            <div class="back-top">
                <div class="qr-code"></div>
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>
                <!-- 修复后的诗句 -->
                <p class="haiku">🌸雨粒になって花を驚かす这个世界🌸</p>
            </div>
            
            <!-- 替换为 OtherCreatures 扒墙 -->
            <img src="OtherCreatures.png" class="peeking-creature" alt="creature">

            <div class="back-bottom">
                <!-- 修复后的 PRODUCER CARD 大字 -->
                <div class="producer-card-text">PRODUCER<br>CARD</div>
            </div>
        </div>
    </div>
</div>

<script>
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;

    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPlaying) { bgMusic.pause(); musicToggle.innerHTML = '🔇'; }
        else { bgMusic.play().then(() => { musicToggle.innerHTML = '🎵'; }); }
        isPlaying = !isPlaying;
    });

    const dragItem = document.getElementById('draggableCard');
    const cardInner = document.getElementById('cardInner');
    const bgContainer = document.getElementById('bgContainer');
    
    let active = false, hasDragged = false, initialX, initialY, xOffset = -175, yOffset = -100;

    function dragStart(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        initialX = clientX - xOffset;
        initialY = clientY - yOffset;
        if (dragItem.contains(e.target) && !e.target.closest('.music-btn')) {
            active = true; hasDragged = false;
        }
    }
    function dragEnd(e) {
        if (!active) return;
        active = false;
        if (!hasDragged) {
            cardInner.classList.toggle('is-flipped');
            bgContainer.classList.toggle('is-flipped-bg');
        }
    }
    function drag(e) {
        if (active) {
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            if (Math.abs(clientX - (initialX + xOffset)) > 5) hasDragged = true;
            xOffset = clientX - initialX;
            yOffset = clientY - initialY;
            dragItem.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
        }
    }

    document.addEventListener("mousedown", dragStart); document.addEventListener("mouseup", dragEnd); document.addEventListener("mousemove", drag);
    document.addEventListener("touchstart", dragStart, {passive:false}); document.addEventListener("touchend", dragEnd); document.addEventListener("touchmove", drag, {passive:false});
</script>
</body>
</html>
