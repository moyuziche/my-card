<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuigyokuP的专属名片</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@500;700&family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
<style>
    :root {
        --neon-red: #ff1744;
        --dark-bg: #050505;
        --cyber-blue: #00e5ff;
    }

    body {
        margin: 0; padding: 0; height: 100vh; width: 100vw;
        background-color: var(--dark-bg); overflow: hidden;
        display: flex; justify-content: center; align-items: center;
        perspective: 1500px; font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* ================================== */
    /*      赛博数字舞台背景 (不卡顿)        */
    /* ================================== */
    .cyber-stage {
        position: absolute; inset: 0; z-index: -1;
        background: radial-gradient(circle at 50% 50%, #1a0a0a 0%, #000 100%);
    }
    .grid-floor {
        position: absolute; bottom: 0; width: 200%; height: 50vh; left: -50%;
        background-image: 
            linear-gradient(to right, rgba(255, 23, 68, 0.1) 1px, transparent 1px),
            linear-gradient(to top, rgba(255, 23, 68, 0.1) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: perspective(500px) rotateX(60deg);
        animation: gridMove 4s linear infinite;
    }
    @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 0 50px; }
    }

    /* ================================== */
    /*          核心赛博名片容器            */
    /* ================================== */
    .card-wrapper {
        width: 350px; height: 200px; cursor: grab;
        transform-style: preserve-3d; transition: transform 0.1s;
    }
    .card-inner {
        position: relative; width: 100%; height: 100%;
        transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card-inner.is-flipped { transform: rotateY(180deg); }

    .card-face {
        position: absolute; width: 100%; height: 100%;
        backface-visibility: hidden; border-radius: 12px;
        background: #fff; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    }

    /* 🌟 正面：高科技液态流光红区 🌟 */
    .front-bg-red {
        position: absolute; top: 0; left: 0; width: 58%; height: 100%;
        clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
        background: linear-gradient(135deg, #b71c1c, #ff1744, #d32f2f, #ff5252, #b71c1c);
        background-size: 300% 300%;
        animation: liquidFlow 4s linear infinite;
        z-index: 1;
    }
    /* 赛博扫光纹理 */
    .front-bg-red::before {
        content: ''; position: absolute; inset: 0;
        background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 3px);
    }
    @keyframes liquidFlow {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

    .star-logo-20th {
        position: absolute; top: 12px; left: 10px; width: 55px; z-index: 5;
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
    }
    
    .tiny-label {
        position: absolute; bottom: 15px; left: 10px; color: rgba(255,255,255,0.8);
        font-family: 'Roboto Mono', monospace; font-size: 8px; z-index: 5;
    }

    /* 🌟 核心：硬核偏移阴影 (完全复刻参考图) 🌟 */
    .character-box {
        position: absolute; bottom: 0; left: -8%; width: 60%; height: 95%;
        background: url('1.png') no-repeat bottom center; background-size: contain;
        z-index: 3;
        /* 绝对干净的 8px 黑色偏移，绝不遮挡图片 */
        filter: drop-shadow(8px 8px 0px #000);
    }

    .front-content {
        position: absolute; right: 0; width: 65%; height: 100%;
        padding: 15px; box-sizing: border-box;
        display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
        text-align: right; z-index: 4;
    }

    .name-section h2 { 
        margin: 0; font-family: 'Noto Sans SC', sans-serif; font-size: 26px; 
        color: #111; font-weight: 900; letter-spacing: -1px; 
    }
    .name-section p { margin: 2px 0; font-size: 9px; color: #666; font-weight: bold; }

    .nfc-tag {
        font-family: 'Orbitron', sans-serif; font-size: 8px; color: var(--neon-red);
        margin: 10px 0; font-weight: 900; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .socials-box { font-family: 'Roboto Mono', monospace; font-size: 8px; color: #444; }

    /* ================================== */
    /*      背面：现代数字 ID 卡布局        */
    /* ================================== */
    .card-back {
        transform: rotateY(180deg); background: #f0f0f0;
        display: flex; flex-direction: column;
    }
    .back-header {
        height: 40px; background: #000; color: #fff;
        display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
        font-family: 'Orbitron', sans-serif; font-size: 10px;
    }
    .back-body {
        padding: 15px; flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        font-family: 'Roboto Mono', monospace; font-size: 9px; color: #333;
    }
    .qr-zone {
        position: absolute; top: 50px; right: 15px; text-align: center;
    }
    .qr-img {
        width: 45px; height: 45px; border: 1px solid #ddd; border-radius: 4px;
        background: url('space.bilibili.com_488509701.png') center/cover;
    }
    .bili-text { color: #fb7299; font-weight: 900; font-size: 8px; margin-top: 4px; display: block; }

    /* 🌟 格言尊享位置 🌟 */
    .motto-bar {
        background: #fff; padding: 10px; text-align: center;
        border-top: 2px solid var(--neon-red);
        font-size: 10px; color: var(--neon-red); font-weight: bold;
    }
    
    .back-footer-large {
        height: 50px; background: var(--neon-red); color: #fff;
        display: flex; align-items: center; padding-left: 15px;
        font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900;
        font-style: italic; letter-spacing: -1px;
    }

    /* 音乐控制 */
    .music-btn {
        position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
        background: rgba(255,23,68,0.1); border: 2px solid var(--neon-red);
        border-radius: 50%; color: var(--neon-red); display: flex; align-items: center; justify-content: center;
        cursor: pointer; z-index: 100; backdrop-filter: blur(10px);
    }
</style>
</head>
<body>

<div class="cyber-stage">
    <div class="grid-floor"></div>
</div>

<div id="musicToggle" class="music-btn">🔇</div>
<audio id="bgMusic" loop src="bgm.mp3"></audio>

<div class="card-wrapper" id="dragCard">
    <div class="card-inner" id="cardInner">
        <!-- 正面：液态能量 + 硬核阴影 -->
        <div class="card-face">
            <div class="front-bg-red"></div>
            <img src="IDOLMASTER20THLogo.png" class="star-logo-20th" alt="20th Logo">
            <div class="tiny-label">765 PRODUCTION PRODUCER CARD</div>
            <div class="character-box"></div>
            <div class="front-content">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>765プロデューサー科</p>
                    <p style="color: var(--neon-red)">天海春香担当プロデューサー</p>
                </div>
                <div class="nfc-tag">TAP TO START N))</div>
                <div class="socials-box">
                    <div>@: Rain Grain</div>
                    <div>📮: 1635786118@QQ.com</div>
                    <div>📺: bangumi.tv/user/922571</div>
                </div>
            </div>
        </div>

        <!-- 背面：赛博 ID 卡布局 -->
        <div class="card-face card-back">
            <div class="back-header">
                <span>765 PRODUCTION</span>
                <span>ID: SGP-0403</span>
            </div>
            <div class="back-body">
                <div><span>[NAME]</span><br>AMAMI HARUKA</div>
                <div><span>[AGE]</span><br>17</div>
                <div style="grid-column: span 2; margin-top: 10px;">
                    STATUS: ACTIVE PRODUCER<br>
                    CLEARANCE: LEVEL S
                </div>
            </div>
            <div class="qr-zone">
                <div class="qr-img"></div>
                <span class="bili-text">bilibili</span>
            </div>
            <div class="motto-bar">
                🌸雨粒になって花を惊かすこの世界🌸
            </div>
            <div class="back-footer-large">
                PRODUCER CARD
            </div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('musicToggle');
    const audio = document.getElementById('bgMusic');
    btn.onclick = () => {
        if (audio.paused) {
            audio.play(); btn.innerHTML = '🎵'; btn.style.background = 'rgba(255,23,68,0.8)'; btn.style.color = '#fff';
        } else {
            audio.pause(); btn.innerHTML = '🔇'; btn.style.background = 'rgba(255,23,68,0.1)'; btn.style.color = 'var(--neon-red)';
        }
    };

    const card = document.getElementById('dragCard');
    const inner = document.getElementById('cardInner');
    let isDown = false, xOffset = 0, yOffset = 0, startX, startY, startTime;

    const startDrag = (e) => {
        isDown = true;
        const c = e.clientX || e.touches[0].clientX;
        const r = e.clientY || e.touches[0].clientY;
        startX = c - xOffset; startY = r - yOffset;
        startTime = Date.now();
        card.style.transition = 'none';
    };

    const doDrag = (e) => {
        if (!isDown) return;
        e.preventDefault();
        const c = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const r = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        xOffset = c - startX; yOffset = r - startY;
        card.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
    };

    const endDrag = () => {
        if (!isDown) return; isDown = false;
        card.style.transition = '0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        if (Date.now() - startTime < 200) inner.classList.toggle('is-flipped');
    };

    card.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', doDrag);
    window.addEventListener('mouseup', endDrag);
    card.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', doDrag, {passive: false});
    window.addEventListener('touchend', endDrag);
</script>

</body>
</html>
