<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可拖动的名片</title>
<style>
    body {
        font-family: sans-serif;
        background-color: #f0f0f0;
        overflow: hidden; /* 防止拖动时出现滚动条 */
    }
    .card-wrapper {
        position: absolute;
        top: 50px;
        left: 50px;
        cursor: grab;
        perspective: 1000px;
        width: 350px;
        height: 200px;
        user-select: none;
    }
    .card-wrapper:active {
        cursor: grabbing;
    }
    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .card-inner.is-flipped {
        transform: rotateY(180deg);
    }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 15px;
        display: flex;
    }
    /* --- 正面样式 (全新斜边设计) --- */
    .card-front {
        background-color: white; /* 整体底色改为白色 */
        position: relative;
        overflow: hidden; /* 防止内容超出圆角 */
        display: block; /* 取消原来的flex布局 */
    }

    /* 1. 青色斜边背景图层 */
    .front-bg-green {
        position: absolute;
        top: 0;
        left: 0;
        width: 65%; /* 绿色区域的宽度 */
        height: 100%;
        background-color: #2c7a7b; /* 恢复青绿色 */
        /* 核心技巧：使用 polygon 裁剪出一个斜边多边形 (左上, 右上, 右下, 左下) */
        clip-path: polygon(0 0, 100% 0, 55% 100%, 0 100%);
        /* 添加原图那种淡淡的网格底纹背景 */
        background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 15px 15px;
    }

    .star-logo {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        font-size: 20px;
    }

    .tiny-text {
        position: absolute;
        bottom: 10px;
        left: 15px;
        color: rgba(255,255,255,0.5);
        font-size: 6px;
        transform: scale(0.8);
        transform-origin: left bottom;
    }

    /* 2. 人物立绘图层 */
    .front-character {
        position: absolute;
        bottom: 0;
        left: -5%; /* 稍微往左移一点，留出右边文字的空间 */
        width: 60%; /* 因为人物手臂伸开，所以把宽度稍微加大一点 */
        height: 95%;
        /* 把图片名字换成你刚才上传的 1.png */
        background-image: url('1.png'); 
        background-size: contain;
        background-position: bottom left;
        background-repeat: no-repeat;
        z-index: 2; /* 确保人物显示在背景之上 */
        filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.2)); /* 加上一点立体阴影 */
    }


    /* 3. 右侧文字内容图层 */
    .front-content {
        position: absolute;
        top: 0;
        right: 0;
        width: 60%;
        height: 100%;
        padding: 20px 20px 15px 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-end; /* 让所有内容靠右对齐 */
        text-align: right;
        z-index: 3;
    }

    .name-section h2 {
        margin: 0 0 8px 0;
        font-size: 26px;
        color: #111;
        font-weight: 900;
        letter-spacing: 1px;
    }

    .name-section p {
        margin: 3px 0;
        font-size: 10px;
        color: #888;
        font-weight: bold;
    }

    .nfc-section {
        font-size: 8px;
        color: #bbb;
        letter-spacing: 1.5px;
        margin-top: 15px;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .nfc-icon {
        color: #111;
        font-size: 14px;
        font-weight: bold;
    }

    .socials {
        margin-top: auto; /* 把社交信息推到最底部 */
        font-size: 11px;
        color: #333;
        line-height: 1.8;
    }

    .socials div {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px; /* 图标和文字的间距 */
    }

    .socials i {
        font-style: normal;
        font-size: 14px;
        width: 16px;
        text-align: center;
    }

    .back-top { padding: 15px; border-bottom: 1px solid #eee; }
    .back-top p { margin: 2px 0; font-size: 10px; color: #666; }
    .qr-code {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 50px;
        height: 50px;
        /* TODO: 替换成你的二维码图片URL */
        background-image: url('https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=https://example.com');
    }
       .back-bottom {
        flex-grow: 1;
        background-color: #d32f2f; /* 这里保留你刚才改的红色 */
        color: white;
        border-radius: 0 0 15px 15px;
        
        /* 1. 排版调整：靠左对齐并垂直居中 */
        display: flex;
        flex-direction: column;
        justify-content: center; 
        align-items: flex-start; 
        padding-left: 10px;
        overflow: hidden; 

        /* 2. 艺术字效果设置 */
        font-family: 'Arial Black', Impact, sans-serif; 
        font-size: 55px; 
        font-weight: 900; 
        font-style: italic; 
        line-height: 0.85; 
        letter-spacing: -1px; 
        text-shadow: 4px 4px 0px #1a1a1a; 
    }


</style>
</head>
<body>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <!-- 名片正面 -->
        <div class="card-face card-front">
            <div class="front-left"></div>
            <div class="front-right">
                <h2>SuigyokuP</h2>
                <p>765プロデューサー科</p>
                <p>天海春香担当プロデューサー</p>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>✉:</span> 1635786118@QQ.com</div>
                    <div><span>B:</span>space.bilibili.com/488509701</div>
                </div>
                <p class="tap-to-start">TAP TO START</p>
            </div>
        </div>
        <!-- 名片背面 -->
        <div class="card-face card-back">
            <div class="qr-code"></div>
            <div class="back-top">
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>
                <p>雨粒になって花を驚かすこの世界</p>
            </div>
            <div class="back-bottom">
                PRODUCER<br>CARD
            </div>
        </div>
    </div>
</div>

<script>
    const draggableElement = document.getElementById('draggableCard');
    const card = document.getElementById('cardInner');
    let isDragging = false;
    let dragStartX, dragStartY, clickStartTime;

    const startDrag = (clientX, clientY) => {
        isDragging = true;
        clickStartTime = Date.now();
        dragStartX = clientX - draggableElement.offsetLeft;
        dragStartY = clientY - draggableElement.offsetTop;
        draggableElement.style.transition = 'none';
    };

    const drag = (clientX, clientY) => {
        if (isDragging) {
            const newX = clientX - dragStartX;
            const newY = clientY - dragStartY;
            draggableElement.style.left = `${newX}px`;
            draggableElement.style.top = `${newY}px`;
        }
    };

    const endDrag = () => {
        if (!isDragging) return;
        isDragging = false;
        draggableElement.style.transition = '';
        if (Date.now() - clickStartTime < 200) {
            card.classList.toggle('is-flipped');
        }
    };

    // 鼠标事件
    draggableElement.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    document.addEventListener('mousemove', (e) => { e.preventDefault(); drag(e.clientX, e.clientY); });
    document.addEventListener('mouseup', endDrag);

    // 触摸事件 (适配移动端)
    draggableElement.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY), { passive: false });
    document.addEventListener('touchmove', (e) => { if (isDragging) { e.preventDefault(); drag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    document.addEventListener('touchend', endDrag);
</script>

</body>
</html>
