<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuigyokuP的赛博名片</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --haruka-red: #e22b30;
        --cyber-black: #020205;
        --line-glow: rgba(226, 43, 48, 0.3);
    }

    body {
        margin: 0; padding: 0; height: 100vh; width: 100vw;
        background-color: var(--cyber-black); overflow: hidden;
        display: flex; justify-content: center; align-items: center;
        perspective: 1500px; font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* ================================== */
    /*      几何动感舞台背景 (Cyber Space)   */
    /* ================================== */
    .geometric-stage {
        position: absolute; inset: 0; z-index: -1;
        background: radial-gradient(circle at center, #101020 0%, #000 100%);
    }
    /* 滚动的几何线条与块 */
    .geo-element {
        position: absolute; background: var(--line-glow);
        filter: blur(1px); pointer-events: none;
    }
    .line-v { width: 1px; height: 100%; top: 0; animation: moveV 8s linear infinite; }
    .block-h { height: 100px; width: 200px; opacity: 0.1; animation: moveH 12s linear infinite alternate; }

    @keyframes moveV { 0% { transform: translateX(-100vw); } 100% { transform: translateX(100vw); } }
    @keyframes moveH { 0% { transform: translate(-20%, -20%); } 100% { transform: translate(120%, 120%); } }

    /* ================================== */
    /*          核心赛博名片容器            */
    /* ================================== */
    .card-wrapper {
        width: 350px; height: 200px; cursor: grab;
        transform-style: preserve-3d; transition: 0.1s;
    }
    .card-inner {
        position: relative; width: 100%; height: 100%;
        transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .card-inner.is-flipped { transform: rotateY(180deg); }

    .card-face {
        position: absolute; width: 100%; height: 100%;
        backface-visibility: hidden; border-radius: 12px;
        background: #fff; overflow: hidden;
        box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    }

    /* 🌟 正面：炫彩几何流动纹理 🌟 */
    .front-bg-red {
        position: absolute; top: 0; left: 0; width: 58%; height: 100%;
        clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
        background: linear-gradient(135deg, #8e1619, #e22b30, #ff5252, #e22b30);
        background-size: 300% 300%;
        animation: gradientShift 5s ease infinite;
        z-index: 1;
    }
    /* 动态滚动的斜向几何线层 */
    .front-bg-red::after {
        content: ''; position: absolute; inset: 0;
        background: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 10px);
        animation: textureMove 10s linear infinite;
    }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes textureMove { from { background-position: 0 0; } to { background-position: 100px 100px; } }

    .star-logo {
        position: absolute; top: 12px; left: 10px; width: 55px; z-index: 5;
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.6));
    }
    
    .label-765 {
        position: absolute; bottom: 15px; left: 10px; color: rgba(255,255,255,0.7);
        font-family: 'Roboto Mono', monospace; font-size: 8px; z-index: 5; letter-spacing: 1px;
    }

    /* 🌟 核心：硬核偏移阴影 (完全复刻参考图) 🌟 */
    .char-container {
        position: absolute; bottom: 0; left: -8%; width: 60%; height: 95%;
        background: url('1.png') no-repeat bottom center; background-size: contain;
        z-index: 3;
        filter: drop-shadow(8px 8px 0px #000);
    }

    .front-content {
        position: absolute; right: 0; width: 65%; height: 100%;
        padding: 15px; display: flex; flex-direction: column; 
        align-items: flex-end; justify-content: center; text-align: right; z-index: 4;
    }
    .name-section h2 { 
        margin: 0; font-family: 'Helvetica Neue', sans-serif; font-size: 26px; 
        color: #111; font-weight: 900; letter-spacing: -1px; 
    }
    .name-section p { margin: 2px 0; font-size: 9px; color: #666; font-weight: bold; }
    
    .nfc-hint {
        font-family: 'Orbitron', sans-serif; font-size: 8px; color: #999;
        margin: 10px 0; font-weight: 700;
    }

    .socials-list { font-family: 'Roboto Mono', monospace; font-size: 8px; color: #444; line-height: 1.6; }

    /* ================================== */
    /*     背面：鸭子兔子与经典排版重构      */
    /* ================================== */
    .card-back {
        transform: rotateY(180deg); background: #fdfdfd;
        display: flex; flex-direction: column;
    }
    .qr-box {
        position: absolute; top: 15px; right: 15px; text-align: center;
    }
    .qr-img {
        width: 45px; height: 45px; border-radius: 4px;
        background: url('space.bilibili.com_488509701.png') center/cover;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .bili-tag { color: #fb7299; font-weight: bold; font-size: 8px; margin-top: 4px; display: block; }

    .back-text-left {
        padding: 20px; flex: 1; display: flex; flex-direction: column;
        justify-content: flex-start; gap: 4px;
        font-family: 'Roboto Mono', monospace; font-size: 9px; color: #333; font-weight: bold;
    }
    
    /* 🌟 鸭子与兔子图片位置 🌟 */
    .creatures-img {
        position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%);
        width: 140px; height: auto; opacity: 0.9;
        pointer-events: none;
    }

    .back-motto {
        margin-top: auto; padding: 12px; text-align: left; padding-left: 20px;
        font-size: 10px; color: var(--haruka-red); font-weight: bold;
        border-top: 1px solid #eee; background: rgba(0,0,0,0.02);
    }
    
    .back-footer-title {
        height: 55px; background: var(--haruka-red); color: #fff;
        display: flex; align-items: center; padding-left: 20px;
        font-family: 'Arial Black', sans-serif; font-size: 38px; font-weight: 900;
        font-style: italic; letter-spacing: -2px;
    }

    /* 音乐控制 */
    .music-btn {
        position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center;
        cursor: pointer; z-index: 100; backdrop-filter: blur(10px);
    }
</style>
</head>
<body>

<!-- 几何动感舞台背景 -->
<div class="geometric-stage">
    <div class="geo-element line-v" style="left: 20%;"></div>
    <div class="geo-element line-v" style="left: 50%; animation-delay: -2s;"></div>
    <div class="geo-element line-v" style="left: 80%; animation-delay: -4s;"></div>
    <div class="geo-element block-h" style="top: 10%; left: 10%;"></div>
    <div class="geo-element block-h" style="top: 60%; left: 70%; animation-delay: -3s;"></div>
</div>

<div id="musicToggle" class="music-btn">🔇</div>
<audio id="bgMusic" loop src="bgm.mp3"></audio>

<div class="card-wrapper" id="dragCard">
    <div class="card-inner" id="cardInner">
        <!-- 正面：炫彩几何与硬核阴影 -->
        <div class="card-face">
            <div class="front-bg-red"></div>
            <img src="IDOLMASTER20THLogo.png" class="star-logo" alt="20th Logo">
            <div class="label-765">765 PRODUCTION PRODUCER CARD</div>
            <div class="char-container"></div>
            <div class="front-content">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>765プロデューサー科</p>
                    <p style="color: var(--haruka-red)">天海春香担当プロデューサー</p>
                </div>
                <div class="nfc-hint">TAP TO START <span style="color:#000">N))</span></div>
                <div class="socials-list">
                    <div>@: Rain Grain</div>
                    <div>📮: 1635786118@QQ.com</div>
                    <div>📺: bangumi.tv/user/922571</div>
                </div>
            </div>
        </div>

        <!-- 背面：经典排版与鸭子兔子 -->
        <div class="card-face card-back">
            <div class="qr-box">
                <div class="qr-img"></div>
                <span class="bili-tag">bilibili</span>
            </div>
            <div class="back-text-left">
                <div>765 PRODUCTION</div>
                <div>AMAMI HARUKA</div>
                <div>AGE 17</div>
            </div>
            <!-- 鸭子与兔子图像 -->
            <img src="OtherCreatures.png" class="creatures-img" alt="Creatures">
            
            <div class="back-motto">
                🌸雨粒になって花を惊かすこの世界🌸
            </div>
            <div class="back-footer-title">
                PRODUCER CARD
            </div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('musicToggle');
    const audio = document.getElementById('bgMusic');
    btn.onclick = () => {
        if (audio.paused) {
            audio.play(); btn.innerHTML = '🎵'; btn.style.background = '#e22b30';
        } else {
            audio.pause(); btn.innerHTML = '🔇'; btn.style.background = 'rgba(255,255,255,0.05)';
        }
    };

    const card = document.getElementById('dragCard');
    const inner = document.getElementById('cardInner');
    let isDown = false, xOffset = 0, yOffset = 0, startX, startY, startTime;

    const startDrag = (e) => {
        isDown = true;
        const c = e.clientX || e.touches[0].clientX;
        const r = e.clientY || e.touches[0].clientY;
        startX = c - xOffset; startY = r - yOffset;
        startTime = Date.now();
        card.style.transition = 'none';
    };

    const doDrag = (e) => {
        if (!isDown) return;
        e.preventDefault();
        const c = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const r = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        xOffset = c - startX; yOffset = r - startY;
        card.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
    };

    const endDrag = () => {
        if (!isDown) return; isDown = false;
        card.style.transition = '0.5s cubic-bezier(0.23, 1, 0.32, 1)';
        if (Date.now() - startTime < 200) inner.classList.toggle('is-flipped');
    };

    card.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', doDrag);
    window.addEventListener('mouseup', endDrag);
    card.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', doDrag, {passive: false});
    window.addEventListener('touchend', endDrag);
</script>

</body>
</html>
