<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuigyokuP的专属名片</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background-color: #050508; /* 深邃的剧场黑底色 */
    }

    /* ================================== */
    /*       全新舞台背景：光影与氛围        */
    /* ================================== */
    
    /* 1. 待机状态：柔和的光斑 (Bokeh) 模拟演出前的静谧 */
    .stage-standby {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -3;
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 20%),
            radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 25%),
            radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 30%);
        animation: floatBokeh 15s ease-in-out infinite alternate;
    }

    @keyframes floatBokeh {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(-20px) scale(1.05); }
    }

    /* 2. 开演状态 (Live Stage)：聚光灯与温暖的应援光 */
    .stage-live {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -2;
        opacity: 0; /* 默认隐藏，音乐响起时显现 */
        transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        background: radial-gradient(circle at bottom center, rgba(160, 20, 30, 0.2) 0%, transparent 60%);
        overflow: hidden;
    }

    .stage-live.active {
        opacity: 1;
    }

    /* 柔和的舞台聚光灯 */
    .spotlight {
        position: absolute;
        top: -20%;
        width: 150vw;
        height: 150vh;
        background: conic-gradient(from 165deg at 50% 0%, transparent 0deg, rgba(255, 200, 200, 0.08) 15deg, transparent 30deg);
        transform-origin: top center;
        filter: blur(15px);
    }

    .spotlight-1 {
        left: -30%;
        animation: sweepLight 12s ease-in-out infinite alternate;
    }

    .spotlight-2 {
        left: 30%;
        animation: sweepLight 15s ease-in-out infinite alternate-reverse;
        background: conic-gradient(from 165deg at 50% 0%, transparent 0deg, rgba(255, 150, 150, 0.06) 15deg, transparent 30deg);
    }

    @keyframes sweepLight {
        0% { transform: rotate(-10deg); }
        100% { transform: rotate(10deg); }
    }

    /* ================================== */
    /*          音乐播放按钮样式            */
    /* ================================== */
    .music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        color: white;
        cursor: pointer;
        z-index: 100;
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .music-btn:hover {
        background-color: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
    }

    .music-btn.playing {
        background-color: rgba(211, 47, 47, 0.9); 
        box-shadow: 0 0 15px rgba(211, 47, 47, 0.6);
        animation: spin 4s linear infinite;
    }

    @keyframes spin { 
        100% { transform: rotate(360deg); } 
    }

    /* ================================== */
    /*          核心卡片容器                */
    /* ================================== */
    .card-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        perspective: 1000px;
        width: 350px;
        height: 200px;
        user-select: none;
        z-index: 10;
        touch-action: none;
    }

    .card-wrapper:active { cursor: grabbing; }

    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.7); /* 加深了卡片本身的物理阴影，使其更立体 */
    }

    .card-inner.is-flipped { transform: rotateY(180deg); }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 15px;
        background-color: white;
        overflow: hidden;
    }

    /* ================================== */
    /*     名片正面样式 (高级质感重构)       */
    /* ================================== */
    
    /* 极致丝滑的底色呼吸渐变，代替刺眼的扫光 */
    @keyframes smoothBreathe {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .front-bg-red {
        position: absolute;
        top: 0;
        left: 0;
        width: 58%; 
        height: 100%;
        clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
        /* 采用更有层次、不刺眼的深红至鲜红渐变 */
        background: linear-gradient(120deg, #a71d2a, #d32f2f, #e53935, #b71c1c);
        background-size: 200% 200%;
        animation: smoothBreathe 8s ease-in-out infinite;
    }
    
    /* 添加细腻的类镭射/磨砂网纹，提升高级感，拒绝单调 */
    .front-bg-red::before {
        content: '';
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
        pointer-events: none;
    }
    
    .star-logo {
        position: absolute;
        top: 12px;
        left: 10px; 
        width: 55px;
        height: auto;
        filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.6)); 
        z-index: 5;
    }
    
    .tiny-text {
        position: absolute;
        bottom: 15px;
        left: 10px; 
        color: rgba(255,255,255,0.85);
        font-size: 10px;
        transform: scale(0.6);
        transform-origin: left bottom;
        white-space: nowrap;
        z-index: 5;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    /* 🌟 重做的人物光影：微微描边 + 柔和弥散阴影 🌟 */
    .front-character {
        position: absolute;
        bottom: 0;
        left: -8%; 
        width: 60%; 
        height: 95%;
        background-image: url('1.png'); 
        background-size: contain;
        background-position: bottom center;
        background-repeat: no-repeat;
        z-index: 2;
        /* 
           第一层阴影：白色微光，仿佛背后有灯光打出轮廓 (Rim light)
           第二层阴影：柔和的黑色弥散，增加自然的空间层次感
        */
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.35)) 
                drop-shadow(3px 5px 8px rgba(0, 0, 0, 0.4));
    }

    .front-content {
        position: absolute;
        top: 0;
        right: 0;
        width: 65%; 
        height: 100%;
        padding: 15px 15px 15px 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        text-align: right;
        z-index: 3;
    }

    .name-section h2 { margin: 0 0 5px 0; font-size: 24px; color: #111; font-weight: 900; }
    .name-section p { margin: 2px 0; font-size: 9px; color: #777; font-weight: bold; }
    
    .nfc-section {
        font-size: 8px;
        color: #999;
        margin-top: 10px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: bold;
        animation: breathing 2.5s infinite;
    }

    @keyframes breathing {
        0% { opacity: 0.5; }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.5; }
    }

    .nfc-icon { color: #111; font-size: 12px; }

    .socials { font-size: 9px; color: #444; line-height: 1.6; }
    .socials div { display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
    .socials span { font-weight: bold; font-style: italic; }

    /* ================================== */
    /*          名片背面样式                */
    /* ================================== */
    .card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
    }

    .qr-code {
        position: absolute;
        top: 12px;
        right: 15px;
        width: 45px;
        height: 45px;
        background-image: url('space.bilibili.com_488509701.png');
        background-size: cover;
        border-radius: 4px;
        box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    /* 保留 Bilibili 专属印记 */
    .qr-code::after {
        content: 'bilibili';
        position: absolute;
        bottom: -14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        color: #fb7299;
        font-weight: 900;
        font-style: italic;
        letter-spacing: 0.5px;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.9);
    }
    
    .back-top { 
        padding: 15px; 
        height: 44%; 
        box-sizing: border-box;
    }

    .back-top p { margin: 3px 0; font-size: 9px; color: #555; font-weight: bold; }
    
    .back-bottom {
        height: 56%; 
        position: relative;
        /* 与正面统一的高级质感渐变 */
        background: linear-gradient(120deg, #a71d2a, #d32f2f, #e53935, #b71c1c);
        background-size: 200% 200%;
        animation: smoothBreathe 8s ease-in-out infinite;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding-left: 20px;
    }

    .back-bottom::before {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.05) 3px, transparent 3px, transparent 8px),
            radial-gradient(circle at bottom right, rgba(0,0,0,0.4), transparent 80%);
        pointer-events: none; z-index: 1;
    }

    .back-bottom-text {
        position: relative;
        z-index: 3;
        color: white;
        font-family: 'Arial Black', Impact, sans-serif;
        font-size: 40px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.85;
        letter-spacing: -1px;
        text-shadow: 4px 4px 0px #1a1a1a;
    }
</style>
</head>
<body>

<!-- 待机氛围底色：光斑飘动 -->
<div class="stage-standby"></div>

<!-- Live舞台氛围：聚光灯效果 -->
<div id="stageLive" class="stage-live">
    <div class="spotlight spotlight-1"></div>
    <div class="spotlight spotlight-2"></div>
</div>

<!-- 音乐播放器 -->
<audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>
<div id="musicToggle" class="music-btn" title="播放/暂停音乐">🔇</div>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <!-- 名片正面 -->
        <div class="card-face card-front">
            <div class="front-bg-red"></div>
            <img src="IDOLMASTER20THLogo.png" class="star-logo" alt="20th Logo">
            <div class="tiny-text">765 PRODUCTION PRODUCER CARD</div>
            <div class="front-character"></div>
            <div class="front-content">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>765プロデューサー科</p>
                    <p>天海春香担当プロデューサー</p>
                </div>
                <div class="nfc-section">
                    TAP TO START <span class="nfc-icon">N))</span>
                </div>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>📮:</span> 1635786118@QQ.com</div>
                    <div><span>📺:</span>bangumi.tv/user/922571</div>
                </div>
            </div>
        </div>
        <!-- 名片背面 -->
        <div class="card-face card-back">
            <div class="qr-code"></div>
            <div class="back-top">
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>
                <p style="margin-top: 15px;">🌸雨粒になって花を驚かすこの世界🌸</p>
            </div>
            <div class="back-bottom">
                <div class="back-bottom-text">
                    PRODUCER<br>CARD
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // === 音乐与舞台氛围切换 ===
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    const stageLive = document.getElementById('stageLive');
    let isPlaying = false;

    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation(); 

        if (isPlaying) {
            bgMusic.pause();
            musicToggle.classList.remove('playing');
            musicToggle.innerHTML = '🔇';
            // 音乐暂停，聚光灯退去，回到深邃的待机光斑
            stageLive.classList.remove('active'); 
        } else {
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '🎵';
                    // 音乐响起，柔和的聚光灯亮起
                    stageLive.classList.add('active'); 
                }).catch(error => {
                    console.log("Play failed: ", error);
                    stageLive.classList.add('active');
                });
            }
        }
        isPlaying = !isPlaying;
    });

    // === 拖拽引擎 ===
    const dragItem = document.getElementById('draggableCard');
    const cardInner = document.getElementById('cardInner');

    let active = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = -175; 
    let yOffset = -100;
    let clickStartTime;

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }
        if (e.target === dragItem || dragItem.contains(e.target)) {
            active = true;
            clickStartTime = Date.now();
            dragItem.style.transition = 'none';
            document.body.style.cursor = 'grabbing';
        }
    }

    function dragEnd(e) {
        if (!active) return;
        
        initialX = currentX;
        initialY = currentY;
        active = false;
        dragItem.style.transition = '';
        document.body.style.cursor = 'default';
        if (Date.now() - clickStartTime < 200) {
            cardInner.classList.toggle('is-flipped');
        }
    }

    function drag(e) {
        if (active) {
            e.preventDefault();
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }
            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, currentY, dragItem);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = `translate(${xPos}px, ${yPos}px)`;
    }

    document.addEventListener("touchstart", dragStart, { passive: false });
    document.addEventListener("touchend", dragEnd, false);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);
</script>

</body>
</html>
