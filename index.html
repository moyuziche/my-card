<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuigyokuP的专属名片</title>
<style>
    /* ================================== */
    /*      全新：红蓝炫彩流体背景          */
    /* ================================== */
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0; padding: 0;
        height: 100vh; width: 100vw;
        overflow: hidden;
        background-color: #05050a; /* 极暗的深空底色 */
    }

    /* 背景容器，控制整体颜色的过渡 */
    .bg-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -2;
        overflow: hidden;
        /* 背景色微调，配合翻转 */
        transition: background-color 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    /* 炫彩光球通用属性 */
    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px); /* 核心：极度模糊产生流体融合感 */
        transition: all 0.8s cubic-bezier(0.4, 0.2, 0.2, 1); /* 跟随卡片翻转的平滑动画 */
    }

    /* 红色光球（代表春香） */
    .orb-red {
        width: 70vw; height: 70vw;
        background: rgba(229, 57, 53, 0.65); /* 春香红 */
        top: -10%; left: -10%;
        animation: float-red 12s infinite alternate ease-in-out;
    }

    /* 蓝色光球（代表千早） */
    .orb-blue {
        width: 80vw; height: 80vw;
        background: rgba(30, 136, 229, 0.4); /* 千早蓝 */
        bottom: -20%; right: -15%;
        animation: float-blue 15s infinite alternate-reverse ease-in-out;
    }
    
    /* 辅助紫红色光球，增加色彩过渡的层次感 */
    .orb-purple {
        width: 50vw; height: 50vw;
        background: rgba(142, 36, 170, 0.4);
        top: 40%; left: 30%;
        animation: float-purple 10s infinite alternate ease-in-out;
    }

    /* 光球的自由浮动动画 */
    @keyframes float-red { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 15%) scale(1.1); } }
    @keyframes float-blue { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-15%, -10%) scale(1.05); } }
    @keyframes float-purple { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-10%, 20%) scale(1.2); } }

    /* === 灵魂联动：当卡片翻转到背面（千早）时的背景状态 === */
    .bg-container.is-flipped-bg {
        background-color: #020b14; /* 底色变冷 */
    }
    .bg-container.is-flipped-bg .orb-red {
        opacity: 0.2; /* 红色光球变暗 */
        transform: translate(-20%, -20%) scale(0.8); /* 红色退缩 */
    }
    .bg-container.is-flipped-bg .orb-blue {
        background: rgba(21, 101, 192, 0.75); /* 蓝色光球变亮、变深邃 */
        transform: translate(-5%, -5%) scale(1.2); /* 蓝色扩张占据主导 */
    }
    .bg-container.is-flipped-bg .orb-purple {
        background: rgba(57, 73, 171, 0.5); /* 紫色偏向深蓝 */
    }

    /* ================================== */
    /*          音乐播放按钮样式            */
    /* ================================== */
    .music-btn {
        position: fixed; top: 20px; right: 20px;
        width: 45px; height: 45px;
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        font-size: 22px; color: white;
        cursor: pointer; z-index: 100;
        backdrop-filter: blur(10px); /* 磨砂玻璃效果增强 */
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .music-btn:hover { background-color: rgba(255, 255, 255, 0.2); transform: scale(1.1); }
    .music-btn.playing { background-color: rgba(211, 47, 47, 0.9); box-shadow: 0 0 15px rgba(211, 47, 47, 0.6); animation: spin 4s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ================================== */
    /*          核心卡片容器                */
    /* ================================== */
    .card-wrapper {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        cursor: grab; perspective: 1000px;
        width: 350px; height: 200px;
        user-select: none; z-index: 10; touch-action: none;
    }
    .card-wrapper:active { cursor: grabbing; }

    .card-inner {
        position: relative; width: 100%; height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d; border-radius: 15px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1); /* 加强阴影让卡片浮现出来 */
    }
    .card-inner.is-flipped { transform: rotateY(180deg); }

    .card-face {
        position: absolute; width: 100%; height: 100%;
        -webkit-backface-visibility: hidden; backface-visibility: hidden;
        border-radius: 15px; background-color: white; overflow: hidden;
    }

    /* ================================== */
    /*          名片正面样式                */
    /* ================================== */
    .front-bg-red {
        position: absolute; top: 0; left: 0; width: 58%; height: 100%;
        background-color: #d32f2f;
        clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
        background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 10px 10px;
    }
    .star-logo { position: absolute; top: 12px; left: 10px; width: 55px; height: auto; filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.8)); }
    .tiny-text {
        position: absolute; bottom: 15px; left: 10px; color: rgba(255,255,255,0.6); font-size: 10px;
        transform: scale(0.6); transform-origin: left bottom; white-space: nowrap;
    }
    .front-character {
        position: absolute; bottom: 0; left: -8%; width: 60%; height: 95%;
        background-image: url('1.png'); background-size: contain; background-position: bottom center; background-repeat: no-repeat; z-index: 2;
        filter: drop-shadow(4px 4px 4px rgba(0,0,0,0.25));
    }
    .front-content {
        position: absolute; top: 0; right: 0; width: 65%; height: 100%;
        padding: 15px 15px 15px 0; box-sizing: border-box; display: flex; flex-direction: column;
        justify-content: center; align-items: flex-end; text-align: right; z-index: 3;
    }
    .name-section h2 { margin: 0 0 5px 0; font-size: 24px; color: #111; font-weight: 900; }
    .name-section p { margin: 2px 0; font-size: 9px; color: #777; font-weight: bold; }
    .nfc-section { font-size: 8px; color: #999; margin-top: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; font-weight: bold; animation: breathing 2.5s infinite; }
    @keyframes breathing { 0% { opacity: 0.5; } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.5; } }
    .nfc-icon { color: #111; font-size: 12px; }
    .socials { font-size: 9px; color: #444; line-height: 1.6; }
    .socials div { display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
    .socials span { font-weight: bold; font-style: italic; }

    /* ================================== */
    /*          名片背面样式                */
    /* ================================== */
    .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; }

    /* 优化后的二维码 + B站文字 */
    .qr-code {
        position: absolute; top: 15px; right: 15px;
        width: 45px; height: 45px;
        background-image: url('space.bilibili.com_488509701.png');
        background-size: cover; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .qr-code::after {
        content: 'bilibili'; position: absolute; top: 100%; left: 50%;
        transform: translateX(-50%); margin-top: 3px; color: #fb7299; /* 猛男粉 */
        font-size: 9px; font-weight: 900; letter-spacing: 0.5px;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.9);
    }
    
    .back-top { padding: 15px; height: 44%; box-sizing: border-box; }
    .back-top p { margin: 3px 0; font-size: 9px; color: #555; font-weight: bold; }
    
    .back-bottom {
        height: 56%; background-color: #d32f2f; color: white;
        background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.05), rgba(0,0,0,0.05) 3px, transparent 3px, transparent 8px), radial-gradient(circle at bottom right, #a00000, transparent 80%);
        display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
        padding-left: 20px; font-family: 'Arial Black', Impact, sans-serif; font-size: 40px; font-weight: 900; font-style: italic;
        line-height: 0.85; letter-spacing: -1px; text-shadow: 4px 4px 0px #1a1a1a; position: relative;
    }

    /* === 全新：千早头像框 === */
    .chihaya-avatar {
        position: absolute;
        bottom: 12px; right: 15px;
        width: 50px; height: 50px;
        border-radius: 50%;
        /* 头像边框：白色带一点微透，很精致 */
        border: 2px solid rgba(255, 255, 255, 0.9);
        /* 请确保同一文件夹下有 chihaya.png 这张图 */
        background-image: url('chihaya.png'); 
        background-size: cover;
        background-position: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.4); /* 立体悬浮感 */
        transition: transform 0.3s ease;
    }
    .chihaya-avatar:hover {
        transform: scale(1.1) rotate(5deg); /* 悬浮小彩蛋 */
    }

</style>
</head>
<body>

<!-- 炫彩光球背景层 -->
<div id="bgContainer" class="bg-container">
    <div class="orb orb-red"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-purple"></div>
</div>

<!-- 音乐播放器 -->
<audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>
<div id="musicToggle" class="music-btn" title="播放/暂停音乐">🔇</div>

<!-- 名片本体 -->
<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <!-- 正面 (春香) -->
        <div class="card-face card-front">
            <div class="front-bg-red">
                <img src="IDOLMASTER20THLogo.png" class="star-logo" alt="20th Logo">
                <div class="tiny-text">765 PRODUCTION PRODUCER CARD</div>
            </div>
            <div class="front-character"></div>
            <div class="front-content">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>765プロデューサー科</p>
                    <p>天海春香担当プロデューサー</p>
                </div>
                <div class="nfc-section">
                    TAP TO START <span class="nfc-icon">N))</span>
                </div>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>📮:</span> 1635786118@QQ.com</div>
                    <div><span>📺:</span>bangumi.tv/user/922571</div>
                </div>
            </div>
        </div>
        <!-- 背面 (千早) -->
        <div class="card-face card-back">
            <div class="qr-code"></div>
            <div class="back-top">
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>
                <p style="margin-top: 15px;">🌸雨粒になって花を驚かすこの世界🌸</p>
            </div>
            <div class="back-bottom">
                PRODUCER<br>CARD
                
                <!-- 替换为千早头像 (注意图片名字要是 chihaya.png，或者自己改) -->
                <div class="chihaya-avatar"></div>

            </div>
        </div>
    </div>
</div>

<script>
    // 音乐控制逻辑
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;

    const startAudioOnFirstInteraction = () => {
        document.removeEventListener('click', startAudioOnFirstInteraction);
        document.removeEventListener('touchstart', startAudioOnFirstInteraction);
    };
    document.addEventListener('click', startAudioOnFirstInteraction);
    document.addEventListener('touchstart', startAudioOnFirstInteraction);

    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation(); 
        if (isPlaying) {
            bgMusic.pause();
            musicToggle.classList.remove('playing');
            musicToggle.innerHTML = '🔇';
        } else {
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '🎵';
                }).catch(e => console.log("用户需要先与页面交互才能播放音乐。", e));
            }
        }
        isPlaying = !isPlaying;
    });

    // 拖拽与联动翻转逻辑
    const dragItem = document.getElementById('draggableCard');
    const cardInner = document.getElementById('cardInner');
    const bgContainer = document.getElementById('bgContainer'); // 获取背景容器
    
    let active = false; let currentX; let currentY; let initialX; let initialY;
    let xOffset = -175; let yOffset = -100;
    let hasDragged = false;

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }
        if (dragItem.contains(e.target)) {
            active = true; hasDragged = false; dragItem.style.transition = 'none';
        }
    }

    function dragEnd(e) {
        if (!active) return;
        active = false; dragItem.style.transition = '';
        if (!hasDragged) {
            if(e.target && (dragItem.contains(e.target) || e.target === cardInner)){
                 // 核心联动：卡片翻转的同时，背景也切换状态！
                 cardInner.classList.toggle('is-flipped');
                 bgContainer.classList.toggle('is-flipped-bg'); 
            }
        }
    }

    function drag(e) {
        if (active) {
            if (!hasDragged && (Math.abs(e.clientX - (initialX + xOffset)) > 5 || Math.abs(e.clientY - (initialY + yOffset)) > 5)) {
                hasDragged = true;
            }
            e.preventDefault();
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }
            xOffset = currentX; yOffset = currentY;
            setTranslate(currentX, yOffset, dragItem);
        }
    }

    function setTranslate(xPos, yPos, el) { el.style.transform = `translate(${xPos}px, ${yPos}px)`; }

    document.addEventListener("touchstart", dragStart, { passive: false });
    document.addEventListener("touchend", dragEnd, false);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);
</script>
</body>
</html>
