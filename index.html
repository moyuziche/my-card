<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可拖动的名片</title>
<style>
    body {
        font-family: sans-serif;
        background-color: #f0f0f0;
        overflow: hidden; /* 防止拖动时出现滚动条 */
    }
    .card-wrapper {
        position: absolute;
        top: 50px;
        left: 50px;
        cursor: grab;
        perspective: 1000px;
        width: 350px;
        height: 200px;
        user-select: none;
    }
    .card-wrapper:active {
        cursor: grabbing;
    }
    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .card-inner.is-flipped {
        transform: rotateY(180deg);
    }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 15px;
        display: flex;
    }
    .card-front { background-color: white; }
    .front-left {
        width: 45%;
        /* TODO: 替换成你的图片 URL */
        background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRz-b13NoSApl82h0_b_Dt3ZkGk9Z_b-Q&s');
        background-size: cover;
        background-position: center;
        border-radius: 15px 0 0 15px;
    }
    .front-right {
        width: 55%;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 8px;
    }
    .front-right h2 { margin: 0; font-size: 24px; font-weight: bold; }
    .front-right p { margin: 0; font-size: 12px; color: #555; }
    .front-right .tap-to-start { font-size: 10px; color: #888; align-self: flex-end; }
    .front-right .socials { margin-top: 15px; font-size: 12px; line-height: 1.6; }
    .front-right .socials div { display: flex; align-items: center; }
    .front-right .socials span { display: inline-block; width: 20px; font-weight: bold; }
    .card-back {
        background-color: white;
        color: black;
        transform: rotateY(180deg);
        flex-direction: column;
    }
    .back-top { padding: 15px; border-bottom: 1px solid #eee; }
    .back-top p { margin: 2px 0; font-size: 10px; color: #666; }
    .qr-code {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 50px;
        height: 50px;
        /* TODO: 替换成你的二维码图片URL */
        background-image: url('https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=https://example.com');
    }
    .back-bottom {
        flex-grow: 1;
        background-color: #d32f2f; 
        color: white;
        border-radius: 0 0 15px 15px;
        
        /* 1. 排版调整：靠左对齐并垂直居中 */
        display: flex;
        flex-direction: column;
        justify-content: center; 
        align-items: flex-start; 
        padding-left: 10px; 
        overflow: hidden; 

        /* 2. 艺术字效果设置 /
        font-family: 'Arial Black', Impact, sans-serif; 
        font-size: 55px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.85; 
        letter-spacing: -1px; 
        text-shadow: 4px 4px 0px #1a1a1a; 
    }

</style>
</head>
<body>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <!-- 名片正面 -->
        <div class="card-face card-front">
            <div class="front-left"></div>
            <div class="front-right">
                <h2>SuigyokuP</h2>
                <p>765プロデューサー科</p>
                <p>天海春香担当プロデューサー</p>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>✉:</span> 1635786118@QQ.com</div>
                    <div><span>B:</span>space.bilibili.com/488509701</div>
                </div>
                <p class="tap-to-start">TAP TO START</p>
            </div>
        </div>
        <!-- 名片背面 -->
        <div class="card-face card-back">
            <div class="qr-code"></div>
            <div class="back-top">
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>

                <p>雨粒になって花を驚かすこの世界</p>
            </div>
            <div class="back-bottom">
                PRODUCER<br>CARD
            </div>
        </div>
    </div>
</div>

<script>
    const draggableElement = document.getElementById('draggableCard');
    const card = document.getElementById('cardInner');
    let isDragging = false;
    let dragStartX, dragStartY, clickStartTime;

    const startDrag = (clientX, clientY) => {
        isDragging = true;
        clickStartTime = Date.now();
        dragStartX = clientX - draggableElement.offsetLeft;
        dragStartY = clientY - draggableElement.offsetTop;
        draggableElement.style.transition = 'none';
    };

    const drag = (clientX, clientY) => {
        if (isDragging) {
            const newX = clientX - dragStartX;
            const newY = clientY - dragStartY;
            draggableElement.style.left = `${newX}px`;
            draggableElement.style.top = `${newY}px`;
        }
    };

    const endDrag = () => {
        if (!isDragging) return;
        isDragging = false;
        draggableElement.style.transition = '';
        if (Date.now() - clickStartTime < 200) {
            card.classList.toggle('is-flipped');
        }
    };

    // 鼠标事件
    draggableElement.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    document.addEventListener('mousemove', (e) => { e.preventDefault(); drag(e.clientX, e.clientY); });
    document.addEventListener('mouseup', endDrag);

    // 触摸事件 (适配移动端)
    draggableElement.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY), { passive: false });
    document.addEventListener('touchmove', (e) => { if (isDragging) { e.preventDefault(); drag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    document.addEventListener('touchend', endDrag);
</script>

</body>
</html>
