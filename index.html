    /* ================================== */
    /*          网页整体星空背景设计         */

    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        width: 100%;
        overflow: hidden;
        background: linear-gradient(to bottom, #090a0f 0%, #1b2735 100%);
    }

    .starry-background {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -2;
        pointer-events: none; 
        background-image: 
            radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent),
            radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
            radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.9), transparent),
            radial-gradient(1.5px 1.5px at 90px 40px, #fff, transparent),
            radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.7), transparent),
            radial-gradient(1px 1px at 160px 120px, #fff, transparent),
            radial-gradient(2.5px 2.5px at 200px 150px, rgba(255,255,255,0.6), transparent),
            radial-gradient(1px 1px at 250px 50px, #fff, transparent),
            radial-gradient(1.5px 1.5px at 300px 180px, #fff, transparent),
            radial-gradient(2px 2px at 350px 90px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 400px 220px, #fff, transparent);
        background-repeat: repeat;
        background-size: 350px 350px;
        animation: twinkle 5s infinite alternate;
    }

    @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
    }
