<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可拖动的名片</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #f0f0f0;
        overflow: hidden;
        margin: 0;
        padding: 0;
    }

    /* --- 核心卡片容器 --- */
    .card-wrapper {
        position: absolute;
        top: 100px;
        left: 50px;
        cursor: grab;
        perspective: 1000px;
        width: 350px;
        height: 200px;
        user-select: none;
    }
    .card-wrapper:active {
        cursor: grabbing;
    }
    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
    .card-inner.is-flipped {
        transform: rotateY(180deg);
    }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 15px;
        background-color: white;
        overflow: hidden;
    }

    /* ================================== */
    /*          名片正面样式                */
    /* ================================== */
    
    /* 1. 将原本的青色斜边改为了你要求的 #d32f2f 红色 */
    .front-bg-red {
        position: absolute;
        top: 0;
        left: 0;
        width: 65%;
        height: 100%;
        background-color: #d32f2f; /* 已经修改为红色 */
        clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
        background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 10px 10px;
    }
    .star-logo {
        position: absolute;
        top: 10px;
        left: 15px;
        color: white;
        font-size: 20px;
    }
    .tiny-text {
        position: absolute;
        bottom: 15px;
        left: 15px;
        color: rgba(255,255,255,0.6);
        font-size: 10px;
        transform: scale(0.6);
        transform-origin: left bottom;
        white-space: nowrap;
    }

    /* 2. 人物立绘 (春香) */
    .front-character {
        position: absolute;
        bottom: 0;
        left: -5%; 
        width: 60%; 
        height: 95%;
        background-image: url('1.png'); 
        background-size: contain;
        background-position: bottom center;
        background-repeat: no-repeat;
        z-index: 2;
        filter: drop-shadow(4px 4px 4px rgba(0,0,0,0.25));
    }

    /* 3. 右侧文字信息 (排版调整以适应长链接) */
    .front-content {
        position: absolute;
        top: 0;
        right: 0;
        width: 60%; /* 稍微加宽一点，给B站链接留空间 */
        height: 100%;
        padding: 15px 15px 15px 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        text-align: right;
        z-index: 3;
    }
    .name-section h2 { margin: 0 0 5px 0; font-size: 24px; color: #111; font-weight: 900; }
    .name-section p { margin: 2px 0; font-size: 9px; color: #777; font-weight: bold; }
    
    .nfc-section {
        font-size: 8px;
        color: #999;
        margin-top: 10px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: bold;
    }
    .nfc-icon { color: #111; font-size: 12px; }

    /* 社交信息区：缩小了一点字号以免超出屏幕 */
    .socials { font-size: 9px; color: #444; line-height: 1.6; }
    .socials div { display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
    .socials span { font-weight: bold; font-style: italic; }

    /* ================================== */
    /*          名片背面样式                */
    /* ================================== */
    .card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
    }
    .qr-code {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 45px;
        height: 45px;
        /* 这里如果你有B站主页的二维码，可以替换掉 */
        background-image: url('https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=https://space.bilibili.com/488509701');
        background-size: cover;
    }
    .back-top { 
        padding: 15px; 
        height: 40%;
        box-sizing: border-box;
    }
    .back-top p { margin: 3px 0; font-size: 9px; color: #555; font-weight: bold; }
    
    .back-bottom {
        height: 60%;
        background-color: #d32f2f; /* 背面也是红色 */
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding-left: 20px;
        font-family: 'Arial Black', Impact, sans-serif;
        font-size: 40px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.85;
        letter-spacing: -1px;
        text-shadow: 4px 4px 0px #1a1a1a;
    }
</style>
</head>
<body>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        
        <!-- 名片正面 -->
        <div class="card-face card-front">
            <div class="front-bg-red">
                <div class="star-logo">★</div>
                <!-- 左下角的英文小字我也顺手帮你改成765专属了 -->
                <div class="tiny-text">765 PRODUCTION PRODUCER CARD</div>
            </div>
            
            <div class="front-character"></div>
            
            <div class="front-content">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>765プロデューサー科</p>
                    <p>天海春香担当プロデューサー</p>
                </div>
                <div class="nfc-section">
                    TAP TO START <span class="nfc-icon">N))</span>
                </div>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>✉:</span> 1635786118@QQ.com</div>
                    <div><span>B:</span> space.bilibili.com/488509701</div>
                </div>
            </div>
        </div>

        <!-- 名片背面 -->
        <div class="card-face card-back">
            <div class="qr-code"></div>
            <div class="back-top">
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>
                <p>雨粒になって花を驚かすこの世界</p>
            </div>
            <div class="back-bottom">
                PRODUCER<br>CARD
            </div>
        </div>
        
    </div>
</div>

<script>
    const draggableElement = document.getElementById('draggableCard');
    const card = document.getElementById('cardInner');
    let isDragging = false;
    let dragStartX, dragStartY, clickStartTime;

    const startDrag = (clientX, clientY) => {
        isDragging = true;
        clickStartTime = Date.now();
        dragStartX = clientX - draggableElement.offsetLeft;
        dragStartY = clientY - draggableElement.offsetTop;
        draggableElement.style.transition = 'none';
        document.body.style.cursor = 'grabbing';
    };

    const drag = (clientX, clientY) => {
        if (isDragging) {
            const newX = clientX - dragStartX;
            const newY = clientY - dragStartY;
            draggableElement.style.left = `${newX}px`;
            draggableElement.style.top = `${newY}px`;
        }
    };

    const endDrag = () => {
        if (!isDragging) return;
        isDragging = false;
        draggableElement.style.transition = '';
        document.body.style.cursor = 'default';
        if (Date.now() - clickStartTime < 200) {
            card.classList.toggle('is-flipped');
        }
    };

    draggableElement.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    document.addEventListener('mousemove', (e) => { e.preventDefault(); drag(e.clientX, e.clientY); });
    document.addEventListener('mouseup', endDrag);

    draggableElement.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY), { passive: false });
    document.addEventListener('touchmove', (e) => { if (isDragging) { e.preventDefault(); drag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    document.addEventListener('touchend', endDrag);
</script>

</body>
</html>
