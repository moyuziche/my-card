<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuigyokuP的专属名片</title>
<style>
    /* ================================== */
    /*          网页整体星空背景设计         */
    /* ================================== */
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    }

    .starry-background {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -1; /* 位于最底层 */
        pointer-events: none; 
        background-image: 
            radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent),
            radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
            radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.9), transparent),
            radial-gradient(1.5px 1.5px at 90px 40px, #fff, transparent),
            radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.7), transparent),
            radial-gradient(1px 1px at 160px 120px, #fff, transparent),
            radial-gradient(2.5px 2.5px at 200px 150px, rgba(255,255,255,0.6), transparent),
            radial-gradient(1px 1px at 250px 50px, #fff, transparent),
            radial-gradient(1.5px 1.5px at 300px 180px, #fff, transparent),
            radial-gradient(2px 2px at 350px 90px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 400px 220px, #fff, transparent);
        background-repeat: repeat;
        background-size: 350px 350px;
        animation: twinkle 5s infinite alternate;
    }

    @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
    }

    /* 底部群山剪影设计 */
    .mountains {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 30vh;
        z-index: 0; /* 在星空之上 */
        pointer-events: none;
        background-image: 
            radial-gradient(ellipse 150% 100% at 30% 100%, #05070a 40%, transparent 41%),
            radial-gradient(ellipse 180% 120% at 80% 100%, #05070a 45%, transparent 46%),
            radial-gradient(ellipse 200% 100% at 50% 100%, #0a0d14 35%, transparent 36%),
            radial-gradient(ellipse 150% 90% at 10% 100%, #0a0d14 40%, transparent 41%),
            radial-gradient(ellipse 250% 80% at 70% 100%, #10151f 30%, transparent 31%);
        background-position: bottom;
        background-repeat: no-repeat;
    }
    
    /* ================================== */
    /*            流星动画效果              */
    /* ================================== */
    .shooting-stars-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1; /* 在群山之上，卡片之下 */
        overflow: hidden;
    }

    .star {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 6px 0 rgba(255, 255, 255, 0.8),
                    0 0 10px 0 rgba(255, 255, 255, 0.4);
        animation: shoot 3s linear infinite;
    }

    .star::after {
        content: '';
        position: absolute;
        top: 50%;
        transform: translateY(-50%) rotate(45deg);
        width: 200px;
        height: 1px;
        background: linear-gradient(to left, rgba(255, 255, 255, 0.6), transparent);
    }

    @keyframes shoot {
        0% { transform: translate(-20vw, -20vh); opacity: 1; }
        100% { transform: translate(120vw, 120vh); opacity: 0; }
    }

    .shooting-stars-container .star:nth-child(1) { top: 10%; left: 20%; animation-duration: 3s; animation-delay: 0.5s; }
    .shooting-stars-container .star:nth-child(2) { top: 30%; left: 80%; animation-duration: 4s; animation-delay: 1.2s; }
    .shooting-stars-container .star:nth-child(3) { top: 60%; left: 5%; animation-duration: 3.5s; animation-delay: 2.5s; }
    .shooting-stars-container .star:nth-child(4) { top: 80%; left: 90%; animation-duration: 5s; animation-delay: 3s; }

    /* ================================== */
    /*          音乐播放按钮样式            */
    /* ================================== */
    .music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        color: white;
        cursor: pointer;
        z-index: 100;
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .music-btn:hover {
        background-color: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
    }
    .music-btn.playing {
        background-color: rgba(211, 47, 47, 0.9); 
        box-shadow: 0 0 15px rgba(211, 47, 47, 0.6);
        animation: spin 4s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ================================== */
    /*          核心卡片容器                */
    /* ================================== */
    .card-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        perspective: 1000px;
        width: 350px;
        height: 200px;
        user-select: none;
        z-index: 10;
        touch-action: none;
    }
    .card-wrapper:active { cursor: grabbing; }

    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .card-inner.is-flipped { transform: rotateY(180deg); }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 15px;
        background-color: white;
        overflow: hidden;
    }

    /* ================================== */
    /*          名片正面样式                */
    /* ================================== */
    .front-bg-red {
        position: absolute;
        top: 0; left: 0;
        width: 58%; height: 100%;
        background-color: #d32f2f;
        clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
        background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 10px 10px;
    }
    
    .star-logo {
        position: absolute;
        top: 12px; left: 10px; 
        width: 55px; height: auto;
        filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.8)); 
    }
    
    .tiny-text {
        position: absolute;
        bottom: 15px; left: 10px; 
        color: rgba(255,255,255,0.6);
        font-size: 10px;
        transform: scale(0.6);
        transform-origin: left bottom;
        white-space: nowrap;
    }

    .front-character {
        position: absolute;
        bottom: 0; left: -8%; 
        width: 60%; height: 95%;
        background-image: url('1.png'); 
        background-size: contain;
        background-position: bottom center;
        background-repeat: no-repeat;
        z-index: 2;
        filter: drop-shadow(4px 4px 4px rgba(0,0,0,0.25));
    }

    .front-content {
        position: absolute;
        top: 0; right: 0;
        width: 65%; height: 100%;
        padding: 15px 15px 15px 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        text-align: right;
        z-index: 3;
    }

    .name-section h2 { margin: 0 0 5px 0; font-size: 24px; color: #111; font-weight: 900; }
    .name-section p { margin: 2px 0; font-size: 9px; color: #777; font-weight: bold; }
    
    .nfc-section {
        font-size: 8px; color: #999;
        margin-top: 10px; margin-bottom: 10px;
        display: flex; align-items: center; gap: 5px;
        font-weight: bold;
        animation: breathing 2.5s infinite;
    }

    @keyframes breathing {
        0% { opacity: 0.5; }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.5; }
    }

    .nfc-icon { color: #111; font-size: 12px; }
    .socials { font-size: 9px; color: #444; line-height: 1.6; }
    .socials div { display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
    .socials span { font-weight: bold; font-style: italic; }

    /* ================================== */
    /*          名片背面样式                */
    /* ================================== */
    .card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
    }

    .qr-code {
        position: absolute;
        top: 15px; right: 15px;
        width: 45px; height: 45px;
        background-image: url('space.bilibili.com_488509701.png');
        background-size: cover;
    }
    
    .back-top { 
        padding: 15px; height: 44%; 
        box-sizing: border-box;
    }
    .back-top p { margin: 3px 0; font-size: 9px; color: #555; font-weight: bold; }
    
    .back-bottom {
        height: 56%; 
        background-color: #d32f2f;
        color: white;
        background-image: 
            repeating-linear-gradient(-45deg, rgba(0,0,0,0.05), rgba(0,0,0,0.05) 3px, transparent 3px, transparent 8px),
            radial-gradient(circle at bottom right, #a00000, transparent 80%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding-left: 20px;
        font-family: 'Arial Black', Impact, sans-serif;
        font-size: 40px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.85;
        letter-spacing: -1px;
        text-shadow: 4px 4px 0px #1a1a1a;
        position: relative; /* 为了定位蝴蝶结 */
    }

    /* === 新增：天海春香蝴蝶结Logo === */
    .haruka-bow {
        position: absolute;
        bottom: 12px;
        right: 15px;
        width: 50px;
        height: 50px;
        opacity: 0.5;
        filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
    }

    .haruka-bow svg {
        width: 100%;
        height: 100%;
        overflow: visible;
    }

</style>
</head>
<body>

<!-- 星空背景 -->
<div class="starry-background"></div>

<!-- 底部群山 -->
<div class="mountains"></div>

<!-- 流星 -->
<div class="shooting-stars-container">
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
</div>

<!-- 音乐播放器 -->
<audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>
<div id="musicToggle" class="music-btn" title="播放/暂停音乐">🔇</div>

<!-- 名片本体 -->
<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <!-- 名片正面 -->
        <div class="card-face card-front">
            <div class="front-bg-red">
                <img src="IDOLMASTER20THLogo.png" class="star-logo" alt="20th Logo">
                <div class="tiny-text">765 PRODUCTION PRODUCER CARD</div>
            </div>
            <div class="front-character"></div>
            <div class="front-content">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>765プロデューサー科</p>
                    <p>天海春香担当プロデューサー</p>
                </div>
                <div class="nfc-section">
                    TAP TO START <span class="nfc-icon">N))</span>
                </div>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>📮:</span> 1635786118@QQ.com</div>
                    <div><span>📺:</span>bangumi.tv/user/922571</div>
                </div>
            </div>
        </div>
        <!-- 名片背面 -->
        <div class="card-face card-back">
            <div class="qr-code"></div>
            <div class="back-top">
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>
                <p style="margin-top: 15px;">🌸雨粒になって花を驚かすこの世界🌸</p>
            </div>
            <div class="back-bottom">
                PRODUCER<br>CARD

                <!-- 新增：蝴蝶结Logo -->
                <div class="haruka-bow">
                    <svg viewBox="0 0 100 100">
                        <path d="M 50,50 
                                 C 10,80 10,20 50,50 
                                 C 90,20 90,80 50,50" 
                              fill="#F8BBD0" 
                              stroke="#E91E63" 
                              stroke-width="3"/>
                        <circle cx="50" cy="50" r="8" fill="#E91E63"/>
                    </svg>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    // === 音乐播放控制 ===
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;

    // 首次用户交互后才能自动播放
    const startAudioOnFirstInteraction = () => {
        document.removeEventListener('click', startAudioOnFirstInteraction);
        document.removeEventListener('touchstart', startAudioOnFirstInteraction);
        // 只有在明确的点击事件之后才尝试播放
    };
    document.addEventListener('click', startAudioOnFirstInteraction);
    document.addEventListener('touchstart', startAudioOnFirstInteraction);

    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation(); 
        if (isPlaying) {
            bgMusic.pause();
            musicToggle.classList.remove('playing');
            musicToggle.innerHTML = '🔇';
        } else {
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '🎵';
                }).catch(error => {
                    console.log("用户需要先与页面交互才能播放音乐。", error);
                    // 可以在这里提示用户需要点击页面
                });
            }
        }
        isPlaying = !isPlaying;
    });

    // === 🔥终极全端兼容拖拽引擎 🔥 ===
    const dragItem = document.getElementById('draggableCard');
    const cardInner = document.getElementById('cardInner');
    
    let active = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = -175;
    let yOffset = -100;
    
    let clickStartTime;
    let hasDragged = false;

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }
        
        // 确保事件目标是卡片或其子元素
        if (dragItem.contains(e.target)) {
            active = true;
            clickStartTime = Date.now();
            hasDragged = false; // 重置拖拽标志
            dragItem.style.transition = 'none';
        }
    }

    function dragEnd(e) {
        if (!active) return;
        
        active = false;
        dragItem.style.transition = '';

        // 关键：只有在没有发生 significant 拖拽时才翻转
        if (!hasDragged) {
            // 确保点击事件发生在卡片上，而不是音乐按钮上
            if(e.target && (dragItem.contains(e.target) || e.target === cardInner)){
                 cardInner.classList.toggle('is-flipped');
            }
        }
    }

    function drag(e) {
        if (active) {
            // 标记已经发生拖拽
            if (!hasDragged && (Math.abs(e.clientX - (initialX + xOffset)) > 5 || Math.abs(e.clientY - (initialY + yOffset)) > 5)) {
                hasDragged = true;
            }

            e.preventDefault();
        
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }
            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, yOffset, dragItem);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = `translate(${xPos}px, ${yPos}px)`;
    }

    // 绑定事件
    document.addEventListener("touchstart", dragStart, { passive: false });
    document.addEventListener("touchend", dragEnd, false);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);

</script>
</body>
</html>
