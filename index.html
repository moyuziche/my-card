<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuigyokuP的专属名片</title>
<style>
    /* ================================== */
    /*          网页整体星空背景设计         */
    /* ================================== */
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    }

    .starry-background {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -2;
        pointer-events: none; 
        background-image: 
            radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent),
            radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
            radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.9), transparent),
            radial-gradient(1.5px 1.5px at 90px 40px, #fff, transparent),
            radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.7), transparent),
            radial-gradient(1px 1px at 160px 120px, #fff, transparent),
            radial-gradient(2.5px 2.5px at 200px 150px, rgba(255,255,255,0.6), transparent),
            radial-gradient(1px 1px at 250px 50px, #fff, transparent),
            radial-gradient(1.5px 1.5px at 300px 180px, #fff, transparent),
            radial-gradient(2px 2px at 350px 90px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 400px 220px, #fff, transparent);
        background-repeat: repeat;
        background-size: 350px 350px;
        animation: twinkle 5s infinite alternate;
    }

    @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
    }

    /* ================================== */
    /*      新增：3D偶像舞台与动态探照灯     */
    /* ================================== */
    .idol-stage {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 35vh;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
    }

    .stage-floor {
        position: absolute;
        bottom: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            linear-gradient(to top, rgba(255, 255, 255, 0.2) 1px, transparent 1px),
            linear-gradient(to right, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: perspective(500px) rotateX(75deg);
        transform-origin: bottom center;
        -webkit-mask-image: linear-gradient(to top, black 10%, transparent 80%);
    }

    .stage-light {
        position: absolute;
        bottom: -20px;
        width: 120px;
        height: 200%;
        background: linear-gradient(to top, rgba(255, 255, 255, 0.15), transparent 60%);
        filter: blur(8px);
        transform-origin: bottom center;
        opacity: 0.6;
    }

    .light-left {
        left: 20%;
        animation: sweepLeft 6s infinite alternate ease-in-out;
    }

    .light-right {
        right: 20%;
        animation: sweepRight 7s infinite alternate ease-in-out;
    }

    @keyframes sweepLeft {
        0% { transform: rotate(-15deg) scaleY(1); opacity: 0.3; }
        100% { transform: rotate(25deg) scaleY(1.2); opacity: 0.7; }
    }

    @keyframes sweepRight {
        0% { transform: rotate(15deg) scaleY(1); opacity: 0.3; }
        100% { transform: rotate(-25deg) scaleY(1.2); opacity: 0.7; }
    }

    /* ================================== */
    /*          音乐播放按钮样式            */
    /* ================================== */
    .music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        color: white;
        cursor: pointer;
        z-index: 100;
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .music-btn:hover {
        background-color: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
    }

    .music-btn.playing {
        background-color: rgba(211, 47, 47, 0.9); 
        box-shadow: 0 0 15px rgba(211, 47, 47, 0.6);
        animation: spin 4s linear infinite;
    }

    @keyframes spin { 
        100% { transform: rotate(360deg); } 
    }

    /* ================================== */
    /*          核心卡片容器                */
    /* ================================== */
    .card-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        perspective: 1000px;
        width: 350px;
        height: 200px;
        user-select: none;
        z-index: 10;
        touch-action: none;
    }

    .card-wrapper:active { cursor: grabbing; }

    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .card-inner.is-flipped { transform: rotateY(180deg); }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 15px;
        background-color: white;
        overflow: hidden;
    }

    /* ================================== */
    /*      全局通用动画：流光与扫光        */
    /* ================================== */
    @keyframes flowGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes glassShine {
        0% { transform: translateX(-150%) rotate(30deg); }
        100% { transform: translateX(300%) rotate(30deg); }
    }

    /* ================================== */
    /*       名片正面样式 (炫彩升级)        */
    /* ================================== */
    .front-bg-red {
        position: absolute;
        top: 0;
        left: 0;
        width: 58%; 
        height: 100%;
        clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
        /* 炫彩流光渐变底色 */
        background: linear-gradient(135deg, #b71c1c, #ff1744, #ff5252, #d32f2f);
        background-size: 300% 300%;
        animation: flowGradient 6s ease infinite;
    }
    
    /* 铺上一层科技感网格 */
    .front-bg-red::before {
        content: '';
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px);
        background-size: 10px 10px;
        pointer-events: none;
    }

    /* 动态高光扫过效果 */
    .front-bg-red::after {
        content: '';
        position: absolute; top: -50%; left: 0%; width: 50%; height: 200%;
        background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
        animation: glassShine 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        pointer-events: none;
    }
    
    .star-logo {
        position: absolute;
        top: 12px;
        left: 10px; 
        width: 55px;
        height: auto;
        filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.8)); 
        z-index: 5;
    }
    
    .tiny-text {
        position: absolute;
        bottom: 15px;
        left: 10px; 
        color: rgba(255,255,255,0.8);
        font-size: 10px;
        transform: scale(0.6);
        transform-origin: left bottom;
        white-space: nowrap;
        z-index: 5;
    }

    .front-character {
        position: absolute;
        bottom: 0;
        left: -8%; 
        width: 60%; 
        height: 95%;
        background-image: url('1.png'); 
        background-size: contain;
        background-position: bottom center;
        background-repeat: no-repeat;
        z-index: 2;
    }

    .front-character::after {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: inherit;
        background-size: inherit;
        background-position: inherit;
        background-repeat: inherit;
        z-index: -1;
        filter: brightness(0) opacity(0.5);
        transform: translate(8px, 8px);
    }

    .front-content {
        position: absolute;
        top: 0;
        right: 0;
        width: 65%; 
        height: 100%;
        padding: 15px 15px 15px 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        text-align: right;
        z-index: 3;
    }

    .name-section h2 { margin: 0 0 5px 0; font-size: 24px; color: #111; font-weight: 900; }
    .name-section p { margin: 2px 0; font-size: 9px; color: #777; font-weight: bold; }
    
    .nfc-section {
        font-size: 8px;
        color: #999;
        margin-top: 10px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: bold;
        animation: breathing 2.5s infinite;
    }

    @keyframes breathing {
        0% { opacity: 0.5; }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.5; }
    }

    .nfc-icon { color: #111; font-size: 12px; }

    .socials { font-size: 9px; color: #444; line-height: 1.6; }
    .socials div { display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
    .socials span { font-weight: bold; font-style: italic; }

    /* ================================== */
    /*       名片背面样式 (二维码加强)       */
    /* ================================== */
    .card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
    }

    /* 优化了二维码的展现并增加了 bilibili 标识 */
    .qr-code {
        position: absolute;
        top: 12px;
        right: 15px;
        width: 45px;
        height: 45px;
        background-image: url('space.bilibili.com_488509701.png');
        background-size: cover;
        border-radius: 4px;
        box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    .qr-code::after {
        content: 'bilibili';
        position: absolute;
        bottom: -14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        color: #fb7299; /* B站主题粉色 */
        font-weight: 900;
        font-style: italic;
        letter-spacing: 0.5px;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.9);
    }
    
    .back-top { 
        padding: 15px; 
        height: 44%; 
        box-sizing: border-box;
    }

    .back-top p { margin: 3px 0; font-size: 9px; color: #555; font-weight: bold; }
    
    /* ================================== */
    /*      背面底部红区样式 (炫彩升级)       */
    /* ================================== */
    .back-bottom {
        height: 56%; 
        position: relative;
        overflow: hidden; /* 保证特效不出界 */
        background: linear-gradient(135deg, #b71c1c, #ff1744, #ff5252, #d32f2f);
        background-size: 300% 300%;
        animation: flowGradient 6s ease infinite;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding-left: 20px;
    }

    /* 背面底部的斜纹与阴影叠加 */
    .back-bottom::before {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.05) 3px, transparent 3px, transparent 8px),
            radial-gradient(circle at bottom right, rgba(0,0,0,0.4), transparent 80%);
        pointer-events: none; z-index: 1;
    }

    /* 背面底部的高光扫过 (错开时间) */
    .back-bottom::after {
        content: ''; position: absolute; top: -50%; left: 0%; width: 50%; height: 200%;
        background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
        animation: glassShine 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        animation-delay: 2s; /* 与正面错开时间 */
        pointer-events: none; z-index: 2;
    }

    /* 单独将文字拎出来放在特效上层 */
    .back-bottom-text {
        position: relative;
        z-index: 3;
        color: white;
        font-family: 'Arial Black', Impact, sans-serif;
        font-size: 40px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.85;
        letter-spacing: -1px;
        text-shadow: 4px 4px 0px #1a1a1a;
    }

    /* ================================== */
    /*       狂热星光舞台 Starlight       */
    /* ================================== */
    .starlight-background {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #d32f2f;
        z-index: -3;
        opacity: 0;
        transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
    }

    .starlight-background.active {
        opacity: 1;
    }

    .starlight-background::before,
    .starlight-background::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200vw;
        height: 200vw;
        background-image: 
            radial-gradient(circle at center, rgba(255, 200, 200, 0.4) 0%, transparent 30%),
            radial-gradient(circle at center, rgba(255, 150, 150, 0.3) 0%, transparent 50%);
        transform-origin: center;
        animation: rotate-light 20s linear infinite;
    }

    .starlight-background::after {
        background-image: 
            radial-gradient(ellipse, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
            radial-gradient(ellipse, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 20px 30px;
        animation: move-particles 15s linear infinite;
    }

    @keyframes rotate-light {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes move-particles {
        from { background-position: 0 0; }
        to { background-position: -200px -300px; }
    }
</style>
</head>
<body>

<!-- 星空背景层 -->
<div class="starry-background"></div>
<!-- 新增：星光舞台背景层 (高潮模式) -->
<div id="starlightBackground" class="starlight-background"></div> 

<!-- 替换为：3D偶像待机舞台 (日常模式) -->
<div class="idol-stage">
    <div class="stage-floor"></div>
    <div class="stage-light light-left"></div>
    <div class="stage-light light-right"></div>
</div>

<!-- 音乐播放器 -->
<audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>
<div id="musicToggle" class="music-btn" title="播放/暂停音乐">🔇</div>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <!-- 名片正面 -->
        <div class="card-face card-front">
            <div class="front-bg-red"></div> <!-- 背景层独立，存放动画 -->
            <img src="IDOLMASTER20THLogo.png" class="star-logo" alt="20th Logo">
            <div class="tiny-text">765 PRODUCTION PRODUCER CARD</div>
            <div class="front-character"></div>
            <div class="front-content">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>765プロデューサー科</p>
                    <p>天海春香担当プロデューサー</p>
                </div>
                <div class="nfc-section">
                    TAP TO START <span class="nfc-icon">N))</span>
                </div>
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>📮:</span> 1635786118@QQ.com</div>
                    <div><span>📺:</span>bangumi.tv/user/922571</div>
                </div>
            </div>
        </div>
        <!-- 名片背面 -->
        <div class="card-face card-back">
            <div class="qr-code"></div>
            <div class="back-top">
                <p>765 PRODUCTION</p>
                <p>AMAMI HARUKA</p>
                <p>AGE 17</p>
                <p style="margin-top: 15px;">🌸雨粒になって花を驚かすこの世界🌸</p>
            </div>
            <div class="back-bottom">
                <div class="back-bottom-text">
                    PRODUCER<br>CARD
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // === 音乐播放与背景双向切换控制 ===
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    const starlightBackground = document.getElementById('starlightBackground');
    let isPlaying = false;

    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation(); 

        if (isPlaying) {
            bgMusic.pause();
            musicToggle.classList.remove('playing');
            musicToggle.innerHTML = '🔇';
            // 【关键修改】关闭音乐时，移除 active，退回待机舞台
            starlightBackground.classList.remove('active'); 
        } else {
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '🎵';
                    // 开启音乐时，进入红色狂热高潮舞台
                    starlightBackground.classList.add('active'); 
                }).catch(error => {
                    console.log("Play failed: ", error);
                    starlightBackground.classList.add('active');
                });
            }
        }
        isPlaying = !isPlaying;
    });

    // === 🔥终极全端兼容拖拽引擎 🔥 ===
    const dragItem = document.getElementById('draggableCard');
    const cardInner = document.getElementById('cardInner');

    let active = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = -175; 
    let yOffset = -100;
    let clickStartTime;

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }
        if (e.target === dragItem || dragItem.contains(e.target)) {
            active = true;
            clickStartTime = Date.now();
            dragItem.style.transition = 'none';
            document.body.style.cursor = 'grabbing';
        }
    }

    function dragEnd(e) {
        if (!active) return;
        
        initialX = currentX;
        initialY = currentY;
        active = false;
        dragItem.style.transition = '';
        document.body.style.cursor = 'default';
        if (Date.now() - clickStartTime < 200) {
            cardInner.classList.toggle('is-flipped');
        }
    }

    function drag(e) {
        if (active) {
            e.preventDefault();
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }
            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, currentY, dragItem);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = `translate(${xPos}px, ${yPos}px)`;
    }

    document.addEventListener("touchstart", dragStart, { passive: false });
    document.addEventListener("touchend", dragEnd, false);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);
</script>

</body>
</html>
