<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuigyokuP的专属名片</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0; padding: 0;
        height: 100vh; width: 100vw;
        overflow: hidden;
        background: radial-gradient(ellipse at bottom, #2a1b3d 0%, #0f0a1f 100%);
        position: relative;
    }

    .stage-wrapper {
        position: absolute; inset: 0; z-index: -2;
        perspective: 1600px; perspective-origin: 50% 20%;
        pointer-events: none;
    }

    /* 垂直光柱 + 顶部灯架 + 地板（保持上一版） */
    .vertical-beams { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    .vertical-beam {
        position: absolute; top: -10%; width: 14px; height: 110%;
        background: linear-gradient(transparent, rgba(255,240,200,0.75), transparent);
        filter: blur(18px); opacity: 0.55;
        animation: beam-pulse 3.8s infinite alternate ease-in-out;
    }
    .vertical-beam:nth-child(1) { left: 8%; animation-delay: 0s; background: linear-gradient(transparent, rgba(255,180,255,0.85), transparent); }
    .vertical-beam:nth-child(2) { left: 18%; animation-delay: 0.7s; }
    .vertical-beam:nth-child(3) { left: 29%; animation-delay: 1.4s; background: linear-gradient(transparent, rgba(180,255,255,0.8), transparent); }
    .vertical-beam:nth-child(4) { left: 41%; animation-delay: 0.3s; }
    .vertical-beam:nth-child(5) { left: 53%; animation-delay: 1.1s; }
    .vertical-beam:nth-child(6) { left: 67%; animation-delay: 0.9s; background: linear-gradient(transparent, rgba(255,255,180,0.75), transparent); }
    .vertical-beam:nth-child(7) { left: 79%; animation-delay: 0.5s; }
    .vertical-beam:nth-child(8) { left: 91%; animation-delay: 1.6s; }
    @keyframes beam-pulse { 0%,100% { opacity: 0.45; transform: scaleY(0.95) rotate(-2deg); } 50% { opacity: 0.92; transform: scaleY(1.12) rotate(2deg); } }
    body.music-active .vertical-beam { filter: blur(12px); opacity: 0.9; animation-duration: 2.4s; }

    .stage-top {
        position: absolute; top: -8%; left: 0; width: 100%; height: 35%;
        background: linear-gradient(#1f1833, #0f0c22);
        box-shadow: 0 50px 90px rgba(0,0,0,0.9);
        transform: rotateX(26deg); transform-origin: top center;
        z-index: 3;
    }

    .stage-floor {
        position: absolute; bottom: -12%; left: 0; width: 100%; height: 62%;
        background: linear-gradient(to top, #0f0a22 0%, #1a1433 42%, #2a1f44 78%, transparent 95%);
        box-shadow: 0 0 160px rgba(180,220,255,0.6), inset 0 120px 140px rgba(255,255,255,0.25);
        transform: rotateX(64deg); transform-origin: bottom center;
        z-index: 1; overflow: hidden;
    }
    .stage-floor::before {
        content: ''; position: absolute; inset: 0;
        background: repeating-linear-gradient(82deg, transparent 0px, transparent 38px, rgba(255,255,255,0.18) 39px, rgba(255,255,255,0.18) 40px);
        opacity: 0.65;
    }
    .stage-floor::after {
        content: ''; position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
        width: 78%; height: 52%;
        background: radial-gradient(ellipse at center, rgba(200,240,255,0.65) 0%, transparent 70%);
        filter: blur(12px); animation: floor-reflect 4s infinite ease-in-out;
    }
    @keyframes floor-reflect { 0%,100% { opacity: 0.4; transform: translateX(-50%) scale(0.95); } 50% { opacity: 0.85; transform: translateX(-50%) scale(1.12); } }
    body.music-active .stage-floor { box-shadow: 0 0 220px rgba(180,220,255,0.9), inset 0 120px 140px rgba(255,255,255,0.45); }

    /* ==================== 重做应援棒（这次才是真正的荧光棒） ==================== */
    .cheer-sticks {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none;
    }
    .stick-group {
        position: absolute; top: 28%; width: 22px;
        display: flex; flex-direction: column; gap: 28px;
        animation: cheer-sway 4.2s infinite ease-in-out;
    }
    .left-sticks  { left: 4.5%; }
    .right-sticks { right: 4.5%; animation-delay: 0.9s; }

    .stick {
        position: relative;
        width: 8px;          /* 极细 */
        height: 138px;       /* 真实长度 */
        background: linear-gradient(#fff9e6, #c8f0ff 40%, #ff8be8 80%);
        border-radius: 6px;
        box-shadow: 
            0 0 12px #67e8f9,
            0 0 24px #ff6be8,
            0 0 36px #a855f7;
        opacity: 0.88;
        animation: stick-glow 2s infinite alternate ease-in-out;
    }

    /* 荧光棒顶部发光头 */
    .stick::after {
        content: '';
        position: absolute; top: -6px; left: 50%;
        transform: translateX(-50%);
        width: 14px; height: 14px;
        background: radial-gradient(circle, #fff 40%, #67e8f9 80%);
        border-radius: 50%;
        box-shadow: 0 0 18px 6px #67e8f9;
    }

    @keyframes cheer-sway {
        0%, 100% { transform: rotate(-4deg); }
        50%      { transform: rotate(4deg); }
    }
    @keyframes stick-glow {
        from { opacity: 0.82; }
        to   { opacity: 0.98; }
    }
    body.music-active .stick {
        animation-duration: 1.3s;
        box-shadow: 
            0 0 16px #67e8f9,
            0 0 32px #ff6be8,
            0 0 48px #a855f7;
    }

    /* 音乐按钮 + 卡片（完全不变） */
    .music-btn { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background-color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; color: white; cursor: pointer; z-index: 100; backdrop-filter: blur(5px); transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .music-btn:hover { background-color: rgba(255,255,255,0.2); transform: scale(1.1); }
    .music-btn.playing { background-color: rgba(211,47,47,0.9); box-shadow: 0 0 15px rgba(211,47,47,0.6); animation: spin 4s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .card-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: grab; perspective: 1000px; width: 350px; height: 200px; user-select: none; z-index: 10; touch-action: none; }
    .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1); transform-style: preserve-3d; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
    .card-inner.is-flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; background-color: white; overflow: hidden; }

    .front-bg-red { position: absolute; top: 0; left: 0; width: 58%; height: 100%; background-color: #d32f2f; clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%); background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 10px 10px; }
    .star-logo { position: absolute; top: 12px; left: 10px; width: 55px; height: auto; filter: drop-shadow(0 0 3px rgba(255,255,255,0.8)); }
    .tiny-text { position: absolute; bottom: 15px; left: 10px; color: rgba(255,255,255,0.6); font-size: 10px; transform: scale(0.6); transform-origin: left bottom; white-space: nowrap; }
    .front-character { position: absolute; bottom: 0; left: -8%; width: 60%; height: 95%; background-image: url('1.png'); background-size: contain; background-position: bottom center; background-repeat: no-repeat; z-index: 2; filter: drop-shadow(4px 4px 4px rgba(0,0,0,0.25)); }
    .front-content { position: absolute; top: 0; right: 0; width: 65%; height: 100%; padding: 15px 15px 15px 0; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; text-align: right; z-index: 3; }
    .name-section h2 { margin: 0 0 5px 0; font-size: 24px; color: #111; font-weight: 900; }
    .name-section p { margin: 2px 0; font-size: 9px; color: #777; font-weight: bold; }
    .nfc-section { font-size: 8px; color: #999; margin-top: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; font-weight: bold; animation: breathing 2.5s infinite; }
    @keyframes breathing { 0% { opacity: 0.5; } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.5; } }
    .socials { font-size: 9px; color: #444; line-height: 1.6; }
    .socials div { display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
    .socials span { font-weight: bold; font-style: italic; }

    .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; }
    .qr-code { position: absolute; top: 15px; right: 15px; width: 45px; height: 45px; background-image: url('space.bilibili.com_488509701.png'); background-size: cover; }
    .back-top { padding: 15px; height: 44%; box-sizing: border-box; }
    .back-top p { margin: 3px 0; font-size: 9px; color: #555; font-weight: bold; }
    .back-bottom { height: 56%; background-color: #d32f2f; color: white; background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.05), rgba(0,0,0,0.05) 3px, transparent 3px, transparent 8px), radial-gradient(circle at bottom right, #a00000, transparent 80%); display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 20px; font-family: 'Arial Black', Impact, sans-serif; font-size: 40px; font-weight: 900; font-style: italic; line-height: 0.85; letter-spacing: -1px; text-shadow: 4px 4px 0px #1a1a1a; }
</style>
</head>
<body>

<div class="stage-wrapper">
    <div class="vertical-beams">
        <div class="vertical-beam"></div><div class="vertical-beam"></div><div class="vertical-beam"></div><div class="vertical-beam"></div>
        <div class="vertical-beam"></div><div class="vertical-beam"></div><div class="vertical-beam"></div><div class="vertical-beam"></div>
    </div>
    <div class="stage-top"></div>
    <div class="stage-floor"></div>

    <!-- 全新真实应援棒 -->
    <div class="cheer-sticks">
        <div class="stick-group left-sticks">
            <div class="stick"></div><div class="stick"></div><div class="stick"></div><div class="stick"></div>
            <div class="stick"></div><div class="stick"></div><div class="stick"></div><div class="stick"></div>
        </div>
        <div class="stick-group right-sticks">
            <div class="stick"></div><div class="stick"></div><div class="stick"></div><div class="stick"></div>
            <div class="stick"></div><div class="stick"></div><div class="stick"></div><div class="stick"></div>
        </div>
    </div>
</div>

<audio id="bgMusic" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<div id="musicToggle" class="music-btn" title="播放/暂停音乐">🔇</div>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        <div class="card-face card-front"> ... （正面内容完全不变） </div>
        <div class="card-face card-back"> ... （背面内容完全不变） </div>
    </div>
</div>

<script>
    // 音乐控制 + 卡片拖拽（完全不变）
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;
    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPlaying) {
            bgMusic.pause(); musicToggle.classList.remove('playing'); musicToggle.innerHTML = '🔇';
            document.body.classList.remove('music-active');
        } else {
            bgMusic.play().then(() => {
                musicToggle.classList.add('playing'); musicToggle.innerHTML = '🎵';
                document.body.classList.add('music-active');
            });
        }
        isPlaying = !isPlaying;
    });

    // 拖拽代码（不变）
    const dragItem = document.getElementById('draggableCard');
    const cardInner = document.getElementById('cardInner');
    let active = false, currentX, currentY, initialX, initialY, xOffset = -175, yOffset = -100, clickStartTime;
    function dragStart(e) { /* ... 原代码不变 ... */ }
    function dragEnd(e) { /* ... 原代码不变 ... */ }
    function drag(e) { /* ... 原代码不变 ... */ }
    document.addEventListener("touchstart", dragStart, { passive: false });
    document.addEventListener("touchend", dragEnd, false);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);
</script>
</body>
</html>
